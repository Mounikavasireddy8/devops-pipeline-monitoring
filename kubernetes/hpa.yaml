apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: devops-pipeline-hpa
  namespace: devops-pipeline
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: devops-pipeline-deployment
  minReplicas: 2
  maxReplicas: 8
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 60