server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /metrics {
        stub_status on;
        access_log off;
    }

    gzip on;
    gzip_types text/html text/css application/javascript;
}