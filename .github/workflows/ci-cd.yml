name: CI/CD — Build Test Deploy

on:
  push:
    branches: [ main ]
    

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: devops-pipeline
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.push.outputs.image }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build Docker image
      run: |
        docker build -t $ECR_REPOSITORY:$IMAGE_TAG .
        echo "Image built successfully"

    - name: Test container
      run: |
        docker run -d -p 8080:80 --name test-app $ECR_REPOSITORY:$IMAGE_TAG
        sleep 5
        curl -f http://localhost:8080 && echo "App is healthy!" || exit 1
        docker stop test-app
        docker rm test-app

    - name: Push to ECR
      id: push
      run: |
        REGISTRY=${{ steps.login-ecr.outputs.registry }}
        docker tag $ECR_REPOSITORY:$IMAGE_TAG $REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        docker tag $ECR_REPOSITORY:$IMAGE_TAG $REGISTRY/$ECR_REPOSITORY:latest
        docker push $REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        docker push $REGISTRY/$ECR_REPOSITORY:latest
        echo "image=$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT
        echo "Pushed to ECR successfully"

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
    - name: Deploy to EC2 via SSH
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ec2-user
        key: ${{ secrets.EC2_PRIVATE_KEY }}
        script: |
          aws ecr get-login-password --region ap-south-1 | \
            docker login --username AWS --password-stdin \
            854653744080.dkr.ecr.ap-south-1.amazonaws.com

          docker pull ${{ needs.build-and-test.outputs.image }}

          docker stop devops-app || true
          docker rm devops-app || true

          docker run -d \
            --name devops-app \
            --restart always \
            -p 80:80 \
            ${{ needs.build-and-test.outputs.image }}

          echo "Deployment complete: ${{ needs.build-and-test.outputs.image }}"
          docker ps
          